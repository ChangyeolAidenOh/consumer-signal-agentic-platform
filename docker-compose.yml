services:
  postgres:
    image: postgres:15-alpine
    container_name: hns_postgres
    environment:
      POSTGRES_DB: hns_platform
      POSTGRES_USER: hns_user
      POSTGRES_PASSWORD: hns_local_dev_only
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hns_user -d hns_platform"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    container_name: hns_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://hns_user:hns_local_dev_only@postgres:5432/hns_platform
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OLLAMA_HOST: http://host.docker.internal:11434
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./chroma_data:/app/chroma_data

volumes:
  postgres_data: